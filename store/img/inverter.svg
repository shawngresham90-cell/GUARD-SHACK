<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="ivBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3f47"/><stop offset="1" stop-color="#15181d"/>
    </linearGradient>
    <linearGradient id="ivFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2e34"/><stop offset="1" stop-color="#181b20"/>
    </linearGradient>
    <radialGradient id="ivFan" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#33373d"/><stop offset="1" stop-color="#0d0f12"/>
    </radialGradient>
  </defs>
  <ellipse cx="300" cy="500" rx="205" ry="34" fill="#000" opacity="0.27"/>
  <!-- body -->
  <rect x="120" y="200" width="360" height="240" rx="26" fill="url(#ivBody)" stroke="#0c0e11" stroke-width="3"/>
  <rect x="138" y="218" width="324" height="204" rx="14" fill="url(#ivFace)"/>
  <!-- cooling fan grille (left) -->
  <circle cx="212" cy="320" r="72" fill="#0d0f12"/>
  <circle cx="212" cy="320" r="64" fill="url(#ivFan)"/>
  <g stroke="#4a4f57" stroke-width="6" fill="none" opacity="0.7">
    <circle cx="212" cy="320" r="52"/>
    <circle cx="212" cy="320" r="36"/>
    <circle cx="212" cy="320" r="20"/>
  </g>
  <line x1="212" y1="256" x2="212" y2="384" stroke="#2a2e34" stroke-width="6"/>
  <line x1="148" y1="320" x2="276" y2="320" stroke="#2a2e34" stroke-width="6"/>
  <circle cx="212" cy="320" r="8" fill="#4a4f57"/>
  <!-- AC outlet sockets (right) -->
  <g>
    <rect x="316" y="242" width="128" height="80" rx="12" fill="#e8ebf0"/>
    <rect x="360" y="258" width="8" height="22" rx="2" fill="#1a1d22"/>
    <rect x="392" y="258" width="8" height="22" rx="2" fill="#1a1d22"/>
    <rect x="372" y="288" width="16" height="12" rx="3" fill="#1a1d22"/>
  </g>
  <g>
    <rect x="316" y="332" width="128" height="80" rx="12" fill="#e8ebf0"/>
    <rect x="360" y="348" width="8" height="22" rx="2" fill="#1a1d22"/>
    <rect x="392" y="348" width="8" height="22" rx="2" fill="#1a1d22"/>
    <rect x="372" y="378" width="16" height="12" rx="3" fill="#1a1d22"/>
  </g>
  <!-- power button + green LED -->
  <circle cx="212" cy="410" r="0" fill="none"/>
  <rect x="150" y="392" width="44" height="30" rx="8" fill="#23262b" stroke="#0c0e11" stroke-width="2"/>
  <circle cx="172" cy="407" r="8" fill="#3ee07a"/>
  <circle cx="172" cy="407" r="8" fill="#3ee07a" opacity="0.4"/>
  <!-- label -->
  <text x="230" y="416" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#e8ebf0">1000W</text>
</svg>
