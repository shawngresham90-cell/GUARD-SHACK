<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="tpBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a424b"/><stop offset="0.5" stop-color="#20262d"/><stop offset="1" stop-color="#12161b"/>
    </linearGradient>
    <linearGradient id="tpScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d2f22"/><stop offset="1" stop-color="#041712"/>
    </linearGradient>
    <linearGradient id="tpCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b6570"/><stop offset="0.5" stop-color="#2c333b"/><stop offset="1" stop-color="#14181d"/>
    </linearGradient>
  </defs>
  <ellipse cx="300" cy="495" rx="190" ry="33" fill="#000" opacity="0.27"/>

  <!-- monitor body -->
  <rect x="120" y="150" width="360" height="270" rx="30" fill="url(#tpBody)" stroke="#0b0e12" stroke-width="4"/>
  <rect x="140" y="164" width="320" height="16" rx="8" fill="#565f69" opacity="0.5"/>

  <!-- screen -->
  <rect x="150" y="186" width="300" height="198" rx="16" fill="url(#tpScreen)" stroke="#0b0e12" stroke-width="3"/>
  <rect x="150" y="186" width="300" height="60" rx="16" fill="#39e07a" opacity="0.06"/>

  <!-- title -->
  <text x="300" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#39e07a" opacity="0.85">TPMS</text>

  <!-- four tire readouts -->
  <g font-family="Arial, sans-serif" font-weight="bold">
    <!-- FL -->
    <g transform="translate(178 250)">
      <rect x="0" y="0" width="42" height="56" rx="10" fill="#0a1f18" stroke="#1e5c40" stroke-width="3"/>
      <rect x="8" y="8" width="26" height="40" rx="6" fill="#123528"/>
      <text x="21" y="94" text-anchor="middle" font-size="26" fill="#39e07a">36</text>
    </g>
    <!-- FR -->
    <g transform="translate(380 250)">
      <rect x="0" y="0" width="42" height="56" rx="10" fill="#0a1f18" stroke="#1e5c40" stroke-width="3"/>
      <rect x="8" y="8" width="26" height="40" rx="6" fill="#123528"/>
      <text x="21" y="94" text-anchor="middle" font-size="26" fill="#39e07a">35</text>
    </g>
    <!-- RL -->
    <g transform="translate(178 316)">
      <rect x="0" y="0" width="42" height="56" rx="10" fill="#0a1f18" stroke="#1e5c40" stroke-width="3"/>
      <rect x="8" y="8" width="26" height="40" rx="6" fill="#123528"/>
      <text x="21" y="46" text-anchor="middle" font-size="26" fill="#ffb23e">80</text>
    </g>
    <!-- RR -->
    <g transform="translate(380 316)">
      <rect x="0" y="0" width="42" height="56" rx="10" fill="#0a1f18" stroke="#1e5c40" stroke-width="3"/>
      <rect x="8" y="8" width="26" height="40" rx="6" fill="#123528"/>
      <text x="21" y="46" text-anchor="middle" font-size="26" fill="#39e07a">80</text>
    </g>
  </g>

  <!-- PSI labels -->
  <text x="300" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2f9e63">PSI</text>
  <text x="300" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2f9e63">PSI</text>

  <!-- truck outline in center -->
  <g transform="translate(300 300)" fill="none" stroke="#2f9e63" stroke-width="3" opacity="0.7">
    <rect x="-24" y="-18" width="48" height="36" rx="6"/>
  </g>

  <!-- valve-cap sensor 1 -->
  <g transform="translate(150 430)">
    <rect x="0" y="4" width="18" height="40" rx="5" fill="#1c2229" stroke="#0b0e12" stroke-width="2"/>
    <ellipse cx="9" cy="4" rx="24" ry="18" fill="url(#tpCap)" stroke="#0b0e12" stroke-width="3"/>
    <ellipse cx="3" cy="-2" rx="6" ry="4" fill="#8b96a1" opacity="0.6"/>
    <circle cx="9" cy="4" r="6" fill="#39e07a"/>
  </g>
  <!-- valve-cap sensor 2 -->
  <g transform="translate(420 430)">
    <rect x="0" y="4" width="18" height="40" rx="5" fill="#1c2229" stroke="#0b0e12" stroke-width="2"/>
    <ellipse cx="9" cy="4" rx="24" ry="18" fill="url(#tpCap)" stroke="#0b0e12" stroke-width="3"/>
    <ellipse cx="3" cy="-2" rx="6" ry="4" fill="#8b96a1" opacity="0.6"/>
    <circle cx="9" cy="4" r="6" fill="#39e07a"/>
  </g>
</svg>
