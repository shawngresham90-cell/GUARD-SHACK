<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="glLeather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9a86a"/><stop offset="1" stop-color="#9c6a34"/>
    </linearGradient>
    <linearGradient id="glPalm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c99050"/><stop offset="1" stop-color="#8a5828"/>
    </linearGradient>
    <linearGradient id="glCuff" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a4f26"/><stop offset="1" stop-color="#5a3818"/>
    </linearGradient>
  </defs>
  <ellipse cx="300" cy="495" rx="200" ry="33" fill="#000" opacity="0.27"/>
  <!-- LEFT glove -->
  <g transform="translate(-8 0)">
    <!-- cuff -->
    <path d="M120 420 L120 470 Q160 490 210 470 L210 420 Z" fill="url(#glCuff)" stroke="#4a2e12" stroke-width="3"/>
    <!-- palm body -->
    <path d="M118 250 Q116 210 150 205 Q170 130 190 205 Q210 128 230 205 Q250 132 270 208 L270 300 Q272 380 235 430 L128 430 Q112 350 118 250 Z"
          fill="url(#glLeather)" stroke="#6a441e" stroke-width="4"/>
    <!-- thumb -->
    <path d="M118 300 Q80 300 78 340 Q80 372 120 366 L130 320 Z" fill="url(#glLeather)" stroke="#6a441e" stroke-width="4"/>
    <!-- reinforced palm patch -->
    <path d="M150 300 Q145 250 200 250 Q252 252 250 306 Q250 380 220 415 L165 415 Q140 360 150 300 Z"
          fill="url(#glPalm)" opacity="0.85"/>
    <!-- finger seams -->
    <g stroke="#6a441e" stroke-width="3" fill="none" opacity="0.7">
      <path d="M158 210 L162 300"/><path d="M191 208 L192 300"/><path d="M228 210 L226 300"/>
    </g>
    <!-- highlight -->
    <path d="M150 214 Q170 150 185 214" fill="none" stroke="#f2d6a8" stroke-width="4" opacity="0.7"/>
  </g>
  <!-- RIGHT glove (mirrored, offset) -->
  <g transform="translate(608 0) scale(-1 1)">
    <path d="M120 420 L120 470 Q160 490 210 470 L210 420 Z" fill="url(#glCuff)" stroke="#4a2e12" stroke-width="3"/>
    <path d="M118 250 Q116 210 150 205 Q170 130 190 205 Q210 128 230 205 Q250 132 270 208 L270 300 Q272 380 235 430 L128 430 Q112 350 118 250 Z"
          fill="url(#glLeather)" stroke="#6a441e" stroke-width="4"/>
    <path d="M118 300 Q80 300 78 340 Q80 372 120 366 L130 320 Z" fill="url(#glLeather)" stroke="#6a441e" stroke-width="4"/>
    <path d="M150 300 Q145 250 200 250 Q252 252 250 306 Q250 380 220 415 L165 415 Q140 360 150 300 Z"
          fill="url(#glPalm)" opacity="0.85"/>
    <g stroke="#6a441e" stroke-width="3" fill="none" opacity="0.7">
      <path d="M158 210 L162 300"/><path d="M191 208 L192 300"/><path d="M228 210 L226 300"/>
    </g>
    <path d="M150 214 Q170 150 185 214" fill="none" stroke="#f2d6a8" stroke-width="4" opacity="0.7"/>
  </g>
</svg>
