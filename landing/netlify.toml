# Netlify config for the Trucking Life with Shawn landing page.
# If you connect this repo to Netlify, set the base directory to "landing"
# (or set publish = "landing" if the base is the repo root).

[build]
  publish = "."

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
