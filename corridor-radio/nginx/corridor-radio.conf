# ============================================================
#  Corridor Radio - nginx production reverse proxy
# ------------------------------------------------------------
#  Terminates TLS on 443 and proxies everything (HTTP + the
#  WebSocket signaling endpoint) to the corridor-server backend
#  listening on 127.0.0.1:7681. Port 80 redirects to HTTPS.
#
#  Before deploying, replace the placeholders:
#    - radio.yourdomain.com          -> your real hostname
#    - /etc/ssl/certs/...            -> your certificate paths
#    - /etc/ssl/private/...          -> your private key path
#
#  Install: copy to /etc/nginx/sites-available/corridor-radio.conf
#           and symlink into /etc/nginx/sites-enabled/, then
#           `nginx -t && systemctl reload nginx`.
# ============================================================

# ---- Map the Upgrade header so keep-alive connections that are
#      NOT websockets get "Connection: close" instead of "upgrade".
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ------------------------------------------------------------
#  HTTP :80  ->  redirect everything to HTTPS
# ------------------------------------------------------------
server {
    listen      80;
    listen      [::]:80;
    server_name radio.yourdomain.com;

    # Allow ACME HTTP-01 challenges (Let's Encrypt) to be served
    # over plain HTTP without being redirected.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ------------------------------------------------------------
#  HTTPS :443  ->  reverse proxy to corridor-server (127.0.0.1:7681)
# ------------------------------------------------------------
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name radio.yourdomain.com;

    # ---- TLS certificate / key (placeholder paths) ----
    ssl_certificate     /etc/ssl/certs/radio.yourdomain.com.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/radio.yourdomain.com.key.pem;

    # ---- Reasonable modern TLS defaults ----
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:CORRIDOR_SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;

    # WebSocket audio signaling can carry many concurrent peers.
    client_max_body_size 1m;

    # ------------------------------------------------------------
    #  Proxy ALL requests to the backend. The same upstream serves
    #  the static frontend (HTTP) and the "corridor-protocol"
    #  WebSocket endpoint, so a single location handles both.
    # ------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:7681;

        # ---- WebSocket upgrade handling ----
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # ---- Forward real client info to the backend ----
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # ---- Long-lived WebSocket connections must not be reaped ----
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 30s;

        # ---- Streaming: don't buffer WebSocket frames ----
        proxy_buffering off;
    }
}
