<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rosedale Shop Scheduler</title>
  <link rel="canonical" href="shop.html" />
  <!-- Forward to the app. The script runs first (most reliable); the meta
       refresh is a no-JS fallback. Query string + hash are preserved so deep
       links keep working. -->
  <script>location.replace("shop.html" + location.search + location.hash);</script>
  <meta http-equiv="refresh" content="0; url=shop.html" />
</head>
<body>
  <p>Redirecting to <a href="shop.html">the Rosedale Shop Scheduler</a>…</p>
</body>
</html>
