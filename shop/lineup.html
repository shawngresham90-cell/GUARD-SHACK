<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rosedale Daily Line Up — Dispatch Board</title>
<style>
  :root{
    --bg:#0f1115;--panel:#171a21;--panel2:#1d2230;--line:#2a3142;
    --txt:#e8edf5;--mut:#8b95a8;--acc:#ffb000;
    --ready:#22c55e;--need:#f97316;--drop:#3b82f6;--shop:#a855f7;
    --resched:#ef4444;--hot:#eab308;--open:#64748b;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:15px}
  header{background:linear-gradient(180deg,#13161d,#0d0f14);border-bottom:2px solid var(--acc);padding:12px 16px;position:sticky;top:0;z-index:50}
  .htop{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .brand{font-weight:800;font-size:18px;letter-spacing:.5px}
  .brand span{color:var(--acc)}
  .linkbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 10px;font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap}
  .linkbtn:hover{border-color:var(--acc);color:var(--acc)}
  .daterow{display:flex;align-items:center;gap:8px;margin-left:auto}
  .navbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 11px;cursor:pointer;font-weight:700}
  .navbtn:hover{border-color:var(--acc)}
  select,input{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit}
  #daySel{font-weight:700;min-width:130px;text-align:center}
  .stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .pill{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:13px;font-weight:600}
  .pill b{color:var(--acc)} .pill.warn b{color:var(--need)} .pill.open b{color:var(--open)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px;align-items:center;background:var(--bg);border-bottom:1px solid var(--line);position:sticky;top:96px;z-index:40}
  .toolbar input[type=text]{flex:1;min-width:160px}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 12px;font-weight:600;cursor:pointer;font-size:14px}
  .btn:hover{border-color:var(--acc)}
  .btn.acc{background:var(--acc);color:#000;border-color:var(--acc)}
  .toggle{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--mut);cursor:pointer;user-select:none;background:var(--panel);border:1px solid var(--line);padding:7px 11px;border-radius:8px}
  .toggle.on{color:var(--need);border-color:var(--need)}
  main{padding:8px 12px 80px}
  .group{margin:14px 0 6px}
  .ghdr{display:flex;align-items:center;gap:10px;padding:6px 8px}
  .ghdr h2{margin:0;font-size:14px;letter-spacing:1px;color:var(--acc);text-transform:uppercase}
  .ghdr .cnt{color:var(--mut);font-size:12px}
  .ghdr .cap{margin-left:auto;color:var(--mut);font-size:11px;font-style:italic}
  table{width:100%;border-collapse:collapse}
  th{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);text-align:left;padding:4px 8px;font-weight:600}
  td{padding:6px 8px;border-top:1px solid var(--line);vertical-align:middle;font-size:14px}
  tr.load{background:var(--panel)} tr.load:hover{background:var(--panel2)}
  td.fb{font-variant-numeric:tabular-nums;font-weight:700;color:#cdd6e6;white-space:nowrap}
  td.stat{border-left:5px solid var(--open)}
  .chip{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;cursor:pointer;white-space:nowrap}
  .driver{font-weight:700}
  .nodriver{color:var(--resched);font-style:italic;font-weight:700}
  .appt{font-variant-numeric:tabular-nums;white-space:nowrap;color:#dfe6f2}
  .cmt{color:var(--mut);font-size:12px}
  .cmt .ready{color:#fda4af;font-weight:700}
  .miss{color:var(--need);font-weight:700}
  .editbtn{opacity:.4;cursor:pointer;font-size:12px} tr.load:hover .editbtn{opacity:1}
  .ready-stamp{background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:6px;padding:2px 7px;font-size:11px;cursor:pointer}
  .ready-stamp:hover{border-color:var(--ready);color:var(--ready)}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
  .ov.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow:auto;padding:18px}
  .modal h3{margin:0 0 14px;color:var(--acc)}
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .fgrid label{font-size:11px;color:var(--mut);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
  .fgrid .full{grid-column:1/3}
  .fgrid input,.fgrid select{width:100%}
  .mactions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
  .legend{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px 4px}
  .legend .chip{cursor:default}
  .skel{text-align:center;color:var(--mut);padding:30px;font-style:italic}
  @media(max-width:760px){
    th:nth-child(5),td:nth-child(5),th:nth-child(7),td:nth-child(7){display:none}
    .daterow{margin-left:0;width:100%;justify-content:space-between}
  }
</style>
</head>
<body>
<div id="gate" style="position:fixed;inset:0;z-index:999;background:linear-gradient(180deg,#13161d,#0d0f14);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:24px;text-align:center">
  <div style="font-weight:800;font-size:22px;letter-spacing:.5px">ROSEDALE <span style="color:#ffb000">DAILY LINE UP</span></div>
  <div style="color:#8b95a8;font-size:13px">Dispatch use only</div>
  <input id="gatePw" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')tryGate()"
    style="background:#1d2230;color:#e8edf5;border:1px solid #2a3142;border-radius:8px;padding:11px 14px;font-size:16px;width:220px;text-align:center">
  <button onclick="tryGate()" style="background:#ffb000;color:#000;border:none;border-radius:8px;padding:11px 24px;font-weight:700;font-size:15px;cursor:pointer">Enter</button>
  <div id="gateErr" style="color:#ef4444;font-size:13px;height:16px"></div>
</div>
<script>
function tryGate(){
  var v=document.getElementById('gatePw').value.trim().toUpperCase();
  if(v==='ROSEDALE2026'){document.getElementById('gate').remove();}
  else{document.getElementById('gateErr').textContent='Wrong password';}
}
</script>
<header>
  <div class="htop">
    <div class="brand">ROSEDALE <span>DAILY LINE UP</span></div>
    <a class="linkbtn" href="https://glowing-pavlova-7010ed.netlify.app" target="_blank" rel="noopener">🔧 Shop</a>
    <a class="linkbtn" href="https://idel-demon-6f933c.netlify.app" target="_blank" rel="noopener">⚡ Idle</a>
    <div class="daterow">
      <button class="navbtn" onclick="step(-1)">‹</button>
      <select id="daySel" onchange="setDay(this.selectedIndex)"></select>
      <button class="navbtn" onclick="step(1)">›</button>
      <button class="btn" onclick="buildFromTemplate()" title="Pre-fill this day with the recurring lanes">⚙ Template</button>
      <button class="btn acc" onclick="openAdd()">+ Load</button>
    </div>
  </div>
  <div class="stats" id="stats"></div>
</header>
<div class="toolbar">
  <input type="text" id="search" placeholder="Search freight #, driver, trailer, destination…" oninput="render()">
  <select id="acctFilter" onchange="render()"><option value="">All accounts</option></select>
  <select id="statFilter" onchange="render()">
    <option value="">All status</option>
    <option>READY</option><option>NEED SET</option><option>DROP</option>
    <option>IN SHOP</option><option>RESCHEDULE</option><option>HOT</option><option>OPEN</option>
  </select>
  <div class="toggle" id="needToggle" onclick="toggleNeed()">⚠ NEED SET only</div>
</div>
<div class="legend" id="legend"></div>
<main id="board"></main>

<div class="ov" id="ov"><div class="modal">
  <h3 id="mTitle">Edit Load</h3>
  <div class="fgrid">
    <div><label>Freight Bill</label><input id="f_fb"></div>
    <div><label>Trip</label><select id="f_trip"><option></option><option>Y</option><option>M/L</option><option>DED</option><option>693MI</option><option>850MI</option></select></div>
    <div><label>Account / Shipper</label><select id="f_acct"></select></div>
    <div><label>Status</label><select id="f_status"><option>READY</option><option>NEED SET</option><option>DROP</option><option>IN SHOP</option><option>RESCHEDULE</option><option>HOT</option><option>OPEN</option></select></div>
    <div><label>Driver</label><input id="f_driver" list="dl_drivers"></div>
    <div><label>Trailer</label><input id="f_trailer" list="dl_trailers"></div>
    <div><label>Location / Yard</label><input id="f_loc" list="dl_loc"></div>
    <div><label>Destination</label><input id="f_dest" list="dl_dest"></div>
    <div><label>Load / PO #</label><input id="f_load"></div><div></div>
    <div><label>Pickup Appt</label><input id="f_pick" placeholder="MON 10AM"></div>
    <div><label>Delivery Appt</label><input id="f_del" placeholder="TUES 8AM"></div>
    <div class="full"><label>Comments</label><input id="f_cmt"></div>
  </div>
  <div class="mactions">
    <button class="btn" id="delBtn" onclick="delLoad()" style="margin-right:auto;color:var(--resched)">Delete</button>
    <button class="btn" onclick="closeOv()">Cancel</button>
    <button class="btn acc" onclick="saveLoad()">Save</button>
  </div>
</div></div>

const ACCOUNTS=[
 {key:"SHAW",label:"SHAW"},{key:"ROBINSON",label:"ROBINSON / CHR"},
 {key:"ROPER",label:"ROPER"},{key:"GE",label:"GE"},
 {key:"ROXANE",label:"ROXANE / CGR"},{key:"TOYO",label:"TOYO",cap:"book only if capacity"},
 {key:"TARKETT",label:"TARKETT"},{key:"FOR-DECATUR",label:"FOR-DECATUR"},{key:"HATHAWAY",label:"HATHAWAY"},{key:"EXTRA",label:"EXTRA / BACKLOG"}];
const STATUS_COLORS={"READY":"--ready","NEED SET":"--need","DROP":"--drop","IN SHOP":"--shop","RESCHEDULE":"--resched","HOT":"--hot","OPEN":"--open"};
let nextId=1; DAYS.forEach(d=>d.loads.forEach(l=>{if(l.id>=nextId)nextId=l.id+1}));

// default to today's tab if present (Mon 6/15)
let dayIdx = Math.max(0, DAYS.findIndex(d=>d.label==="Mon 6/15"));
let needOnly=false, editId=null;
function loads(){return DAYS[dayIdx].loads}

function uniqAll(field){const s=new Set();DAYS.forEach(d=>d.loads.forEach(l=>{if(l[field])s.add(l[field])}));return [...s].sort()}
function fillDL(id,field){document.getElementById(id).innerHTML=uniqAll(field).map(v=>`<option value="${v}">`).join('')}

function buildAcctSelects(){
  const o=ACCOUNTS.map(a=>`<option value="${a.key}">${a.label}</option>`).join('');
  document.getElementById('f_acct').innerHTML=o;
  document.getElementById('acctFilter').innerHTML='<option value="">All accounts</option>'+o;
}
function buildDaySel(){document.getElementById('daySel').innerHTML=DAYS.map((d,i)=>`<option ${i===dayIdx?'selected':''}>${d.label}</option>`).join('')}
function setDay(i){dayIdx=i;document.getElementById('daySel').selectedIndex=i;if(loads().length===0){buildFromTemplate(true);}render()}
function step(n){let i=dayIdx+n;if(i<0)i=0;if(i>DAYS.length-1)i=DAYS.length-1;setDay(i)}

function chip(s){const v=STATUS_COLORS[s]||'--open';return `<span class="chip" style="background:var(${v});color:#0b0d12" onclick="cycleStatus(event)">${s}</span>`}
function cycleStatus(e){e.stopPropagation();const order=Object.keys(STATUS_COLORS);const id=+e.target.closest('tr').dataset.id;const l=loads().find(x=>x.id===id);l.status=order[(order.indexOf(l.status)+1)%order.length];render()}
function stampReady(e,id){e.stopPropagation();const l=loads().find(x=>x.id===id);const t=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});l.cmt=(l.cmt?l.cmt+' · ':'')+'READY AT '+t;l.status='READY';render()}

function render(){
  fillDL('dl_drivers','driver');fillDL('dl_trailers','trailer');fillDL('dl_loc','loc');fillDL('dl_dest','dest');
  const q=document.getElementById('search').value.toLowerCase().trim();
  const af=document.getElementById('acctFilter').value, sf=document.getElementById('statFilter').value;
  const all=loads();
  let shown=all.filter(l=>{
    if(af&&l.acct!==af)return false;
    if(sf&&l.status!==sf)return false;
    if(needOnly&&l.status!=='NEED SET')return false;
    if(q){const b=`${l.fb} ${l.driver} ${l.trailer} ${l.dest} ${l.loc} ${l.load} ${l.cmt}`.toLowerCase();if(!b.includes(q))return false;}
    return true;
  });
  const tot=all.length,need=all.filter(l=>l.status==='NEED SET').length,
    open=all.filter(l=>l.status==='OPEN'||!l.driver).length,ready=all.filter(l=>l.status==='READY').length;
  document.getElementById('stats').innerHTML=
    `<span class="pill">Loads <b>${tot}</b></span><span class="pill">Ready <b>${ready}</b></span>
     <span class="pill warn">Need Set <b>${need}</b></span><span class="pill open">No driver <b>${open}</b></span>`;
  document.getElementById('legend').innerHTML=Object.keys(STATUS_COLORS).map(s=>chip(s)).join(' ');
  const board=document.getElementById('board');board.innerHTML='';
  if(tot===0){board.innerHTML='<p class="skel">This day is skeleton only — not built out yet.</p>';return}
  ACCOUNTS.forEach(a=>{
    const rows=shown.filter(l=>l.acct===a.key);if(!rows.length)return;
    const g=document.createElement('div');g.className='group';
    g.innerHTML=`<div class="ghdr"><h2>${a.label}</h2><span class="cnt">${rows.length} load${rows.length>1?'s':''}</span>${a.cap?`<span class="cap">${a.cap}</span>`:''}</div>`;
    const t=document.createElement('table');
    t.innerHTML=`<thead><tr><th>Freight</th><th>Status</th><th>Driver</th><th>Trailer</th><th>Loc</th><th>Destination</th><th>Load #</th><th>Pickup</th><th>Delivery</th><th>Comments</th><th></th></tr></thead>`;
    const tb=document.createElement('tbody');
    rows.forEach(l=>{
      const c=STATUS_COLORS[l.status]||'--open';
      const dc=l.driver?`<span class="driver">${l.driver}</span>`:`<span class="nodriver">NO DRIVER</span>`;
      const rb=(l.status!=='READY'&&l.acct==='SHAW')?`<button class="ready-stamp" onclick="stampReady(event,${l.id})">✓ ready</button>`:'';
      const tr=document.createElement('tr');tr.className='load';tr.dataset.id=l.id;
      tr.innerHTML=`
        <td class="fb stat" style="border-left-color:var(${c})">${l.fb||'<span class="miss">—</span>'}${l.trip?` <small style="color:var(--mut)">${l.trip}</small>`:''}</td>
        <td>${chip(l.status)}</td><td>${dc}</td>
        <td>${l.trailer||'<span class="miss">—</span>'}</td><td>${l.loc||''}</td>
        <td>${l.dest||''}</td><td>${l.load||''}</td>
        <td class="appt">${l.pick||'<span class="miss">SET?</span>'}</td>
        <td class="appt">${l.deliv||'<span class="miss">SET?</span>'}</td>
        <td class="cmt">${(l.cmt||'').replace(/READY AT[^·]*/g,m=>`<span class="ready">${m.trim()}</span>`)} ${rb}</td>
        <td><span class="editbtn" onclick="openEdit(${l.id})">✎</span></td>`;
      tb.appendChild(tr);
    });
    t.appendChild(tb);g.appendChild(t);board.appendChild(g);
  });
  if(!shown.length)board.innerHTML='<p class="skel">No loads match these filters.</p>';
}
function f(id){return document.getElementById(id)}
function fillForm(l){f('f_fb').value=l.fb||'';f('f_trip').value=l.trip||'';f('f_acct').value=l.acct||'SHAW';f('f_status').value=l.status||'OPEN';f('f_driver').value=l.driver||'';f('f_trailer').value=l.trailer||'';f('f_loc').value=l.loc||'';f('f_dest').value=l.dest||'';f('f_load').value=l.load||'';f('f_pick').value=l.pick||'';f('f_del').value=l.deliv||'';f('f_cmt').value=l.cmt||''}
function readForm(){return {fb:f('f_fb').value.trim(),trip:f('f_trip').value,acct:f('f_acct').value,status:f('f_status').value,driver:f('f_driver').value.trim(),trailer:f('f_trailer').value.trim(),loc:f('f_loc').value.trim(),dest:f('f_dest').value.trim(),load:f('f_load').value.trim(),pick:f('f_pick').value.trim(),deliv:f('f_del').value.trim(),cmt:f('f_cmt').value.trim()}}
function openEdit(id){editId=id;const l=loads().find(x=>x.id===id);f('mTitle').textContent='Edit '+(l.fb||'Load');f('delBtn').style.display='';fillForm(l);f('ov').classList.add('show')}
function openAdd(){editId=null;f('mTitle').textContent='Add Load';f('delBtn').style.display='none';fillForm({status:'OPEN',acct:document.getElementById('acctFilter').value||'SHAW'});f('ov').classList.add('show')}
function closeOv(){f('ov').classList.remove('show')}
function saveLoad(){const d=readForm();if(editId){Object.assign(loads().find(x=>x.id===editId),d)}else{d.id=nextId++;loads().push(d)}closeOv();render()}
function delLoad(){if(editId){DAYS[dayIdx].loads=loads().filter(x=>x.id!==editId);closeOv();render()}}
function toggleNeed(){needOnly=!needOnly;document.getElementById('needToggle').classList.toggle('on',needOnly);render()}


function laneKey(l){return (l.acct+'|'+l.dest+'|'+l.pick+'|'+l.deliv).toUpperCase()}
function buildFromTemplate(silent){
  var day=DAYS[dayIdx], have={};
  day.loads.forEach(function(l){have[laneKey(l)]=1});
  var added=0;
  TEMPLATE.forEach(function(t){
    var lane={acct:t.acct,fb:t.fb||'',trip:'',driver:t.driver||'',trailer:'',loc:t.loc||'',
      dest:t.dest,load:t.load||'',pick:t.pick||'',deliv:t.deliv||'',cmt:'',
      status:t.driver?'READY':'OPEN'};
    if(!have[laneKey(lane)]){lane.id=nextId++;day.loads.push(lane);added++;}
  });
  if(!silent){render();}
  return added;
}

buildAcctSelects();buildDaySel();
if(loads().length===0){buildFromTemplate(true);}
render();
</script>
